<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态壁纸 ZIP 生成器</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
    --text:#e6e9ef; --muted:#8b93a3; --accent:#4f8cff; --accent2:#3a6fd8;
    --ok:#3ecf8e; --warn:#f5a623; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.5;padding:32px 16px;}
  .wrap{max-width:680px;margin:0 auto;}
  h1{font-size:20px;margin:0 0 4px;font-weight:650}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
  .drop{border:1.5px dashed var(--border);border-radius:12px;padding:30px 16px;text-align:center;
    cursor:pointer;transition:.15s;background:var(--panel2)}
  .drop.over{border-color:var(--accent);background:#1b2436}
  .drop .big{font-size:15px;color:var(--text)}
  .drop .small{font-size:12px;color:var(--muted);margin-top:6px}
  .fname{margin-top:12px;font-size:13px;color:var(--accent)}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
  input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);margin-top:12px;cursor:pointer}
  .chk input{width:16px;height:16px;accent-color:var(--accent)}
  .btn{width:100%;margin-top:20px;background:var(--accent);color:#fff;border:0;border-radius:10px;
    padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{background:var(--accent2)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .status{margin-top:16px;font-size:13px;padding:12px 14px;border-radius:8px;display:none;white-space:pre-wrap;word-break:break-all}
  .status.info{display:block;background:#15212f;color:var(--accent);border:1px solid #21384f}
  .status.ok{display:block;background:#102019;color:var(--ok);border:1px solid #1c3a2c}
  .status.err{display:block;background:#2a1518;color:var(--err);border:1px solid #4a2329}
  .status.warn{display:block;background:#2a2310;color:var(--warn);border:1px solid #4a3c1c}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .dl{margin-top:12px}
  .dl a{display:inline-block;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    text-decoration:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-right:8px}
  .dl a:hover{border-color:var(--accent);color:var(--accent)}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>动态壁纸 ZIP 生成器</h1>
  <div class="sub">拖入 mp4，一键生成符合后台规范的动态壁纸 zip（含转码 H.264 / 抽帧 / 缩略图 / manifest）</div>

  <div class="panel">
    <div class="drop" id="drop">
      <div class="big">拖入 mp4 到这里，或点击选择</div>
      <div class="small">支持任意来源：非 H.264 / 分辨率不对会自动转码处理</div>
    </div>
    <input type="file" id="file" accept="video/mp4,.mp4" hidden>
    <div class="fname" id="fname" style="display:none"></div>

    <label>壁纸名称 name（英文，下载的 zip 以此命名）</label>
    <input type="text" id="name" placeholder="留空则自动取文件名">

    <label>作者 author（须与设计师账号一致，区分大小写）</label>
    <input type="text" id="author" placeholder="例如 JohnDoe">

    <label>描述 description</label>
    <input type="text" id="desc" placeholder="例如 A calm blue live wallpaper.">

    <label class="chk"><input type="checkbox" id="idfixed"> ID 按名称固定（否则每次随机 UUID，确保不重复）</label>
    <label class="chk"><input type="checkbox" id="dyn"> 额外生成动态预览图（540×1200，可选附件，不进包）</label>
    <div class="hint">动态预览图为探索页推荐用，规范上限 ≤2M；复杂视频可能超限并告警。</div>

    <button class="btn" id="go">生成并下载 ZIP</button>

    <div class="status" id="status"></div>
    <div class="dl" id="dl"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const drop = $('drop'), fileInput = $('file');
let picked = null;

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) setFile(f); });

function setFile(f){
  picked = f;
  $('fname').style.display = 'block';
  $('fname').textContent = '已选择：' + f.name;
  if (!$('name').value) $('name').value = f.name.replace(/\.mp4$/i, '');
}

function setStatus(msg, type){
  const el = $('status');
  el.className = 'status ' + (type || 'info');
  el.innerHTML = msg;
}
function b64toBlob(b64, type){
  const bin = atob(b64);
  const len = bin.length;
  const arr = new Uint8Array(len);
  for (let i=0;i<len;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type});
}
function download(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}

$('go').addEventListener('click', async () => {
  if (!picked){ setStatus('请先选择 mp4 文件', 'warn'); return; }
  const btn = $('go');
  btn.disabled = true;
  setStatus('<span class="spin"></span>处理中…（转码 + 抽帧 + 缩略图 + 打包，请稍候）', 'info');
  $('dl').innerHTML = '';

  const fd = new FormData();
  fd.append('file', picked);
  fd.append('name', $('name').value);
  fd.append('author', $('author').value);
  fd.append('description', $('desc').value);
  fd.append('id_fixed', $('idfixed').checked ? '1' : '0');
  fd.append('dynamic', $('dyn').checked ? '1' : '0');

  try{
    const r = await fetch('/api/package', { method:'POST', body: fd });
    const data = await r.json();
    if (!r.ok){
      setStatus('✗ ' + (data.error || '处理失败'), 'err');
      return;
    }
    download(b64toBlob(data.zip_b64, 'application/zip'), data.zip_name);
    let dl = `<a href="#" id="dlzip">⬇ ${data.zip_name}</a>`;
    if (data.dyn_b64) dl += `<a href="#" id="dldyn">⬇ ${data.dyn_name}</a>`;
    $('dl').innerHTML = dl;
    $('dlzip').onclick = e => { e.preventDefault(); download(b64toBlob(data.zip_b64,'application/zip'), data.zip_name); };
    if (data.dyn_b64) $('dldyn').onclick = e => { e.preventDefault(); download(b64toBlob(data.dyn_b64,'image/gif'), data.dyn_name); };
    setStatus('✓ 完成：' + data.zip_name + ' 已下载\n' + data.report, 'ok');
  }catch(err){
    setStatus('✗ 请求失败：' + err.message, 'err');
  }finally{
    btn.disabled = false;
  }
});
</script>
</body>
</html>
