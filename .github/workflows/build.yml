name: Build Desktop App
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: mac
          - os: windows-latest
            artifact: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 打包 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          FFDIR=$(python -c "import imageio_ffmpeg,os;print(os.path.join(os.path.dirname(imageio_ffmpeg.__file__),'binaries'))")
          python -m PyInstaller --noconfirm --windowed --name "主题资源编辑器" \
            --icon "assets/app_icon.icns" \
            --add-data "web_ui.html:." --add-data "tags_library.json:." --add-data "$FFDIR:imageio_ffmpeg/binaries" \
            --hidden-import app --hidden-import transcode_for_zip --hidden-import tag_matcher --hidden-import image_analyzer --hidden-import vision_ai --hidden-import openpyxl main_app.py

      - name: 打包 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $FFDIR = python -c "import imageio_ffmpeg,os;print(os.path.join(os.path.dirname(imageio_ffmpeg.__file__),'binaries'))"
          python -m PyInstaller --noconfirm --onefile --windowed --name "主题资源编辑器" `
            --icon "assets/app_icon.ico" `
            --add-data "web_ui.html;." --add-data "tags_library.json;." --add-data "$FFDIR;imageio_ffmpeg/binaries" `
            --hidden-import app --hidden-import transcode_for_zip --hidden-import tag_matcher --hidden-import image_analyzer --hidden-import vision_ai --hidden-import openpyxl main_app.py

      - name: 上传产物 (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: 主题资源编辑器-mac
          path: dist/主题资源编辑器.app

      - name: 上传产物 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: 主题资源编辑器-win
          path: dist/主题资源编辑器.exe
